<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrunch Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sand: { 50: '#FCFCFB', 100: '#F4F2EC', 200: '#CFC0BE', 300: '#ADA998', 400: '#66634E' },
              scrunch: { 50: '#F0FCC8', 100: '#CBE772', 200: '#97B038', 300: '#73BC39', 400: '#556F34' },
              ocean: { 50: '#CDE8FE', 100: '#A1CDFD', 200: '#4C8AF5', 300: '#2663F0', 400: '#1120A4' },
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
  </head>
  <body class="min-h-screen bg-sand-50">
    <header class="bg-white border-b border-sand-200 shadow-sm">
      <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center gap-4">
          <img src="/scrunch-logo.svg" alt="Scrunch" class="h-8" />
          <span class="text-sm text-sand-300">Tools</span>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
      <div class="py-8">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-semibold text-sand-400 mb-3">
            Scrunch Tools
          </h1>
          <p class="text-sand-300 text-lg">
            Select a tool to get started.
          </p>
        </div>

        <div id="tile-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 max-w-5xl mx-auto auto-rows-fr"></div>

        <!-- Feedback Section -->
        <div id="feedback-widget" class="max-w-2xl mx-auto mt-14 mb-4">

          <!-- State 1: Invitation -->
          <div id="fb-prompt" class="bg-gradient-to-br from-sand-100 to-white rounded-xl border border-sand-200 px-6 py-7 text-center transition-all duration-300">
            <p class="text-sand-400 text-base font-medium mb-1">
              We're always exploring new tools.
            </p>
            <p class="text-sand-300 text-sm mb-5">
              What would help you most?
            </p>
            <div class="flex justify-center gap-3">
              <button
                onclick="openFeedback('idea')"
                class="inline-flex items-center gap-2 px-4 py-2.5 bg-white border border-sand-200 rounded-lg text-sm font-medium text-sand-400 hover:border-scrunch-200 hover:bg-scrunch-50 hover:text-scrunch-400 transition-all duration-200 shadow-sm hover:shadow"
              >
                <span>💡</span> I have an idea
              </button>
              <button
                onclick="openFeedback('improve')"
                class="inline-flex items-center gap-2 px-4 py-2.5 bg-white border border-sand-200 rounded-lg text-sm font-medium text-sand-400 hover:border-ocean-100 hover:bg-ocean-50 hover:text-ocean-300 transition-all duration-200 shadow-sm hover:shadow"
              >
                <span>🛠</span> Something could be better
              </button>
            </div>
          </div>

          <!-- State 2: Form -->
          <div id="fb-form" class="bg-white rounded-xl border border-sand-200 px-6 py-6 transition-all duration-300" style="display:none; opacity:0;">
            <p id="fb-form-prompt" class="text-sand-400 font-medium text-sm mb-3"></p>
            <textarea
              id="fb-text"
              rows="3"
              class="w-full border border-sand-200 rounded-lg px-3.5 py-2.5 text-sm text-sand-400 placeholder-sand-200 focus:outline-none focus:ring-2 focus:ring-scrunch-200 focus:border-scrunch-200 resize-none transition-all duration-200"
              placeholder="Tell us what's on your mind..."
            ></textarea>
            <div class="flex justify-between items-center mt-3">
              <button
                onclick="closeFeedback()"
                class="text-sand-200 text-sm hover:text-sand-300 transition-colors"
              >
                Cancel
              </button>
              <button
                id="fb-send"
                onclick="submitFeedback()"
                disabled
                class="px-4 py-2 bg-sand-400 text-white text-sm font-medium rounded-lg hover:bg-sand-300 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                Send
              </button>
            </div>
          </div>

          <!-- State 3: Thank You -->
          <div id="fb-thanks" class="bg-gradient-to-br from-scrunch-50 to-white rounded-xl border border-scrunch-100 px-6 py-7 text-center transition-all duration-300" style="display:none; opacity:0;">
            <p class="text-scrunch-300 text-lg mb-1">✓</p>
            <p id="fb-thanks-msg" class="text-sand-400 text-sm leading-relaxed"></p>
          </div>

          <!-- State 4: Settled (persistent after thank-you) -->
          <div id="fb-settled" class="text-center py-4 transition-all duration-300" style="display:none; opacity:0;">
            <p class="text-sand-200 text-xs">✓ Shared with the team</p>
          </div>

        </div>

      </div>
    </main>

    <script>
      // ─── Tile data ────────────────────────────────────────────────────────────
      // Set highlight: true on exactly ONE tile to give it the featured green style
      // and double-wide layout. All others get uniform light-blue icon backgrounds
      // with individual icon colors.
      const tiles = [
        {
          href: '/analyze/',
          label: 'Response Analyzer',
          description: 'Analyze phrase frequency, word patterns, and narrative adoption across AI responses. Upload a CSV export to explore top phrases, search by keyword, and visualize messaging trends.',
          icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />',
          highlight: true,
          badge: 'Updated',
        },
        {
          href: '/export/',
          label: 'API Exporter',
          description: 'Export API data to CSV.',
          icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />',
          iconColor: 'text-orange-400',
        },
        {
          href: '/slides/',
          label: 'Slides Generator',
          description: 'Create Google Slides reports from API data.',
          icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />',
          iconColor: 'text-purple-400',
        },
        {
          href: '/bulk-setup/',
          label: 'Bulk Setup',
          description: 'Configure brands and prompts in bulk.',
          icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />',
          iconColor: 'text-pink-500',
        },
        {
          href: '/axp/',
          label: 'AXP Converter',
          description: 'Convert text files to AI-ready markdown for AXP Content Delivery.',
          icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />',
          iconColor: 'text-red-400',
        },
        {
          href: '/topic-optimizer/',
          label: 'Topic Optimizer',
          description: 'Optimize prompt selections by analyzing coverage and resilience trade-offs. Upload a CSV to visualize which prompts can be pruned.',
          icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />',
          iconColor: 'text-yellow-400',
        },
        {
          href: 'https://lookerstudio.google.com/reporting/c16759f5-d47e-49a0-a43a-9211b721c300',
          label: 'Looker Studio Template',
          description: 'Dashboard template for Scrunch data.',
          icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />',
          iconColor: 'text-cyan-500',
          external: true,
        },
      ];

      // ─── Tile renderer ────────────────────────────────────────────────────────
      function renderTiles() {
        const highlightTiles = tiles.filter(t => t.highlight);
        if (highlightTiles.length > 1) {
          console.warn('Only one tile should have highlight: true — using the first one.');
        }

        const externalIcon = `<svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>`;
        const arrowIcon = `<span class="ml-1 transition-transform group-hover:translate-x-0.5">&rarr;</span>`;

        let firstHighlight = true;

        const html = tiles.map(tile => {
          const linkAttrs = tile.external ? 'target="_blank" rel="noopener noreferrer"' : '';
          const cta = tile.external ? externalIcon : arrowIcon;

          if (tile.highlight && firstHighlight) {
            firstHighlight = false;
            return `
              <a href="${tile.href}" ${linkAttrs}
                class="group bg-white rounded-xl border-2 border-scrunch-200 p-5 transition-all hover:shadow-lg hover:border-scrunch-300 hover:-translate-y-0.5 active:translate-y-0 flex flex-col col-span-2 lg:col-span-2"
              >
                <div class="flex items-start justify-between mb-4">
                  <div class="w-12 h-12 rounded-lg bg-scrunch-50 flex items-center justify-center flex-shrink-0">
                    <svg class="w-7 h-7 text-scrunch-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      ${tile.icon}
                    </svg>
                  </div>
                  ${tile.badge ? `<span class="text-xs font-semibold bg-scrunch-50 text-scrunch-400 px-2 py-0.5 rounded-full">${tile.badge}</span>` : ''}
                </div>
                <h2 class="text-lg font-semibold text-sand-400 mb-1.5">${tile.label}</h2>
                <p class="text-sand-300 text-sm leading-relaxed flex-1">${tile.description}</p>
                <div class="flex items-center text-scrunch-300 font-semibold text-sm group-hover:text-scrunch-400 mt-3">
                  Open${cta}
                </div>
              </a>
            `;
          } else {
            return `
              <a href="${tile.href}" ${linkAttrs}
                class="group bg-white rounded-xl border border-ocean-100 p-5 transition-all hover:shadow-lg hover:border-ocean-200 hover:-translate-y-0.5 active:translate-y-0 flex flex-col"
              >
                <div class="w-12 h-12 rounded-lg bg-sky-50 flex items-center justify-center flex-shrink-0 mb-4">
                  <svg class="w-7 h-7 ${tile.iconColor || 'text-ocean-200'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    ${tile.icon}
                  </svg>
                </div>
                <h2 class="text-lg font-semibold text-sand-400 mb-1.5">${tile.label}</h2>
                <p class="text-sand-300 text-sm leading-relaxed flex-1">${tile.description}</p>
                <div class="flex items-center text-ocean-200 font-semibold text-sm group-hover:text-ocean-300 mt-3">
                  Open${cta}
                </div>
              </a>
            `;
          }
        }).join('');

        document.getElementById('tile-grid').innerHTML = html;
      }

      renderTiles();
    </script>

    <script>
      (function () {
        const prompts = {
          idea: 'What tool or feature would you find useful?',
          improve: 'What would make these tools work better for you?',
        };

        let feedbackType = '';

        function showSettled() {
          hide('fb-prompt');
          hide('fb-form');
          hide('fb-thanks');
          show('fb-settled');
        }

        function show(id) {
          const el = document.getElementById(id);
          el.style.display = '';
          requestAnimationFrame(() => {
            requestAnimationFrame(() => { el.style.opacity = '1'; });
          });
        }

        function hide(id) {
          const el = document.getElementById(id);
          el.style.opacity = '0';
          setTimeout(() => { el.style.display = 'none'; }, 300);
        }

        function hideImmediate(id) {
          const el = document.getElementById(id);
          el.style.opacity = '0';
          el.style.display = 'none';
        }

        window.openFeedback = function (type) {
          feedbackType = type;
          document.getElementById('fb-form-prompt').textContent = prompts[type];
          document.getElementById('fb-text').value = '';
          document.getElementById('fb-send').disabled = true;
          hide('fb-prompt');
          setTimeout(() => {
            show('fb-form');
            document.getElementById('fb-text').focus();
          }, 320);
        };

        window.closeFeedback = function () {
          hide('fb-form');
          setTimeout(() => { show('fb-prompt'); }, 320);
        };

        // Enable Send when there's content
        document.getElementById('fb-text').addEventListener('input', function () {
          document.getElementById('fb-send').disabled = this.value.trim().length === 0;
        });

        window.submitFeedback = async function () {
          const message = document.getElementById('fb-text').value.trim();
          if (!message) return;

          const btn = document.getElementById('fb-send');
          btn.disabled = true;
          btn.textContent = 'Sending...';

          // Pick thank-you message based on detail level
          const isDetailed = message.length >= 100;
          const thanksMsg = isDetailed
            ? "Thanks for taking the time to write this out — feedback like this is incredibly helpful. We review these directly when planning what to build next."
            : "Thanks for sharing this. We review every suggestion as a team.";
          document.getElementById('fb-thanks-msg').textContent = thanksMsg;

          // Fire and forget — show thanks regardless of API result
          try {
            await fetch('/api/feedback', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                type: feedbackType,
                message: message,
                source: window.location.href,
              }),
            });
          } catch (err) {
            console.warn('Feedback submission failed:', err);
          }

          hide('fb-form');
          setTimeout(() => { show('fb-thanks'); }, 320);

          // Settle after 4 seconds
          setTimeout(() => {
            hide('fb-thanks');
            setTimeout(() => { show('fb-settled'); }, 320);
          }, 4000);
        };
      })();
    </script>
  </body>
</html>
